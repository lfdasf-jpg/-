<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>情緒大冒險 - 首頁</title>
    <style>
    body, html {
        margin: 0; padding: 0; height: 100%;
        /* 建議更換為你的背景圖 */
        background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1))
        background-size: cover;
        font-family: 'Microsoft JhengHei', sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: flex-end; /* 將內容推向右邊 */
        align-items: center;
    }

    /* 左下角 Logo [cite: 2] */
    .game-logo {
        position: absolute;
        bottom: 40px;
        left: 70px;
        text-align: left;
        filter: drop-shadow(2px 2px 10px rgba(0,0,0,0.5));
    }
    .game-logo h1 {
        font-size: 60px;
        margin: 0;
        color: #ffffff;
        text-shadow: 4px 4px 0px #4ecca3, 6px 6px 0px rgba(0,0,0,0.2);
        font-style: italic;
    }

    /* 右側選單容器 */
    .menu-container {
        margin-right: 30%; /* 調整與右邊界的距離 */
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 380px;
        z-index: 10;
    }

    /* 華麗風格按鈕 */
    .scene-button {
        position: relative;
        height: 70px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: flex-start; /* 文字靠左對齊 */
        padding-left: 60px;
        transition: all 0.3s ease;
    }

    /* 模擬截圖中的平行四邊形背景 */
    .button-bg {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        /* 這裡的 polygon 調整為向左傾斜的平行四邊形 */
        clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
        background: linear-gradient(90deg, #4b2a5e 0%, #7c4d9b 100%);
        border: 2px solid #ffd700;
        z-index: 1;
        opacity: 0.9;
    }

    /* 不同場景可以使用不同顏色 [cite: 20] */
    .scene-button:nth-child(1) .button-bg { background: linear-gradient(90deg, #ff4757, #ff6b81); } /* 學業-紅色系 */
    .scene-button:nth-child(2) .button-bg { background: linear-gradient(90deg, #5f27cd, #341f97); } /* 人際-紫色系 */
    .scene-button:nth-child(3) .button-bg { background: linear-gradient(90deg, #af00cd, #341f97); }
    .button-text {
        position: relative;
        z-index: 2;
        color: white;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* 裝飾圓點 */
    .deco {
        position: absolute;
        left: 10px;
        width: 25px;
        height: 25px;
        background: white;
        border-radius: 50%;
        z-index: 3;
        box-shadow: 0 0 10px #fff;
    }

    /* 懸停動效 */
    .scene-button:hover {
        transform: translateX(-5px); /* 往左移出一點點 */
        filter: brightness(1.2);
    }
        /* 背景層容器 */
#bg-slider {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* 確保在所有內容之後 */
    background-size: cover;
    background-position: center;
    transition: background-image 1.5s ease-in-out; /* 平滑淡入淡出速度 */
}

/* 疊加一層半透明黑色，確保文字清晰 */
#bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2); /* 20% 的遮罩 */
    z-index: -1;
}
</style>
</head>
<body>
    <div id="bg-slider"></div>
    <div id="bg-overlay"></div>
    <div class="game-logo">
        <h1>Emotional Adventure</h1>
    </div>

    <div class="menu-container">
        <div class="scene-button" onclick="startGame('scene_exam.html')">
            <div class="deco"></div>
            <div class="button-bg"></div>
            <div class="button-text">Academic</div>
        </div>

        <div class="scene-button" onclick="startGame('scene_friend.html')">
            <div class="deco"></div>
            <div class="button-bg"></div>
            <div class="button-text">Interpersonal relationships</div>
        </div>

        <div class="scene-button" onclick="startGame('scene_Family.html')">
            <div class="deco"></div>
            <div class="button-bg"></div>
            <div class="button-text">Family</div>
        </div>

        <div class="scene-button" onclick="startGame('scene_future.html')">
            <div class="deco"></div>
            <div class="button-bg"></div>
            <div class="button-text">Future Anxiety</div>
        </div>
    </div>

    <script>
        function startGame(page) {
            console.log("正在進入場景：" + page);
            window.location.href = page;
        }

        function openShop() {
            // 對應企劃中的世界貨幣與商店 [cite: 21]
            window.location.href = 'shop.html';
        }
        // 1. 定義你的五張圖片網址
const bgImages = [
    'a.png',           // 第一張 (原本的背景)
    'b.png',    // 第二張
    'c.png',// 第三張
    'd.png',      // 第四張
    'e.png'       // 第五張
];

let currentIndex = 0;
const bgSlider = document.getElementById('bg-slider');

// 2. 切換背景的函式
function rotateBackground() {
    // 設定背景圖
    bgSlider.style.backgroundImage = `url('${bgImages[currentIndex]}')`;

    // 計算下一張索引
    currentIndex = (currentIndex + 1) % bgImages.length;
}

// 3. 初始化：立即執行一次並設定每10秒執行一次
rotateBackground();
setInterval(rotateBackground, 10000); // 10000 毫秒 = 10 秒

// 原有的 startGame 函式
function startGame(page) {
    console.log("正在進入場景：" + page);
    window.location.href = page;
}
    </script>

</body>
</html>
